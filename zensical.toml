[project]
site_name = "Lean & Green Recipes"
site_url = "https://recipes.raney.co"
repo_url = "https://github.com/KevinRaney/Recipes"
repo_name = "KevinRaney/Recipes"
edit_uri = "edit/main/docs/"
copyright = "Copyright © 2026 Recipes.Raney.co"

[project.theme]
features = [
  "content.action.edit",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.expand",
  "navigation.indexes",
  "navigation.instant",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.icon.tag]
default = "lucide/hash"
appetizer = "fontawesome/solid/cheese"
soup = "fontawesome/solid/bowl-food"
salad = "fontawesome/solid/leaf"
main = "fontawesome/solid/utensils"
tip = "fontawesome/solid/lightbulb"
beef = "fontawesome/solid/cow"
chicken = "fontawesome/solid/drumstick-bite"
pork = "fontawesome/solid/bacon"
seafood = "fontawesome/solid/fish"
turkey = "fontawesome/solid/drumstick-bite"
vegetarian = "fontawesome/solid/seedling"
shrimp = "fontawesome/solid/shrimp"
salmon = "fontawesome/solid/fish-fins"
crab = "fontawesome/solid/fish"
tuna = "fontawesome/solid/fish"
scallops = "fontawesome/solid/fish"
cod = "fontawesome/solid/fish"
cauliflower = "material/food-apple-outline"
zucchini = "material/food-apple-outline"
"spaghetti-squash" = "material/food-apple-outline"
eggplant = "material/food-apple-outline"
tofu = "material/tofu"
"air-fryer" = "material/fan"
"instant-pot" = "material/pot-steam"
"pressure-cooker" = "material/pot-steam"
"slow-cooker" = "material/pot-steam"
grill = "fontawesome/solid/fire"
oven = "fontawesome/solid/temperature-high"
stovetop = "material/pot-mix"
mexican = "fontawesome/solid/pepper-hot"
italian = "fontawesome/solid/pizza-slice"
asian = "fontawesome/solid/bowl-rice"
mediterranean = "fontawesome/solid/lemon"
cajun = "fontawesome/solid/pepper-hot"
american = "fontawesome/solid/flag-usa"
casserole = "material/baking-pan"
pizza = "fontawesome/solid/pizza-slice"
stuffed = "fontawesome/solid/pepper-hot"
burgers = "fontawesome/solid/burger"
meatballs = "material/food-steak"
wraps = "material/food-croissant"
dip = "fontawesome/solid/jar"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "green"
accent = "green"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "green"
accent = "green"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true
clickable_checkbox = true

[project.extra]
generator = false
