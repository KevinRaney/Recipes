[project]
site_name = "Lean & Green Recipes"
site_url = "https://recipes.raney.co"
repo_url = "https://github.com/KevinRaney/Recipes"
repo_name = "KevinRaney/Recipes"
edit_uri = "edit/main/docs/"
copyright = "Copyright © 2026 Recipes.Raney.co"

[project.theme]
features = [
  "content.action.edit",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.expand",
  "navigation.indexes",
  "navigation.instant",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "green"
accent = "green"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "green"
accent = "green"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true
clickable_checkbox = true

[project.extra]
generator = false
